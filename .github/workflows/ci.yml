name: QA Portfolio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-chromedriver

      - name: Run API tests with Allure results
        run: |
          pytest api_tests/ ui_tests/ -v --env=prod --alluredir=./allure-results
        continue-on-error: true

      # 用 cache 跨构建保留历史数据
      - name: Restore Allure History
        uses: actions/cache@v4
        with:
          path: allure-history
          key: allure-history
          restore-keys: allure-history

      # 关键修复：simple-elf action 硬编码读取 ./gh-pages/last-history
      # 我们把 cache 里的历史数据复制到这个硬编码路径
      - name: Prepare history path for Allure action
        run: |
          mkdir -p gh-pages
          if [ -d "allure-history/last-history" ]; then
            cp -r allure-history/last-history gh-pages/last-history
            echo "History restored from cache to gh-pages/last-history"
          else
            echo "No previous history found (first run or cache miss)"
          fi

      - name: Build Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: ./allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: always()

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-history

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4